services:
  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    environment:
      GF_DEFAULT_APP_MODE: development
      GF_LOG_FILTERS: plugin.volkovlabs-rss-datasource:debug
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/panels.json
      GF_PLUGINS_PREINSTALL: marcusolsson-dynamictext-panel,yesoreyeram-infinity-datasource
    volumes:
      - ./dist:/var/lib/grafana/plugins/volkovlabs-rss-datasource
      - ./provisioning:/etc/grafana/provisioning
    depends_on:
      server:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  server:
    build:
      context: ./xml-server
    ports:
      - 8001:8001
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8001/ping', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s
    profiles:
      - dev
      - playwright

  playwright:
    build:
      context: .
      dockerfile: test/Dockerfile
    environment:
      GRAFANA_URL: http://grafana:3000
    volumes:
      - ./test:/app/test
      - ./playwright-report:/app/playwright-report
    depends_on:
      grafana:
        condition: service_healthy
    profiles:
      - playwright
